{% extends 'base.html' %}
{% block content %}
<html>
<head>
    <title>Komado Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 20px;
            max-width: 800px;
            margin: 40px auto;
        }
    </style>
</head>
    <div class="card">
        <h2>AWS Expenditure (Moto Simulation)</h2>
        <div style="position: relative; height: 350px; width: 100%;">
            <canvas id="motoLineChart"></canvas>
        </div>
    </div>

    {{ chart_data|json_script:"finops-data" }}

    <script>
        // 1. Grab the data that the View injected
        const rawData = JSON.parse(document.getElementById('finops-data').textContent);

        // 2. Setup the Chart
        const ctx = document.getElementById('motoLineChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: rawData.labels,
                datasets: [
                    {
                        label: 'In-Use Resources ($)',
                        data: rawData.in_use,
                        borderColor: '#22c55e', // Green
                        backgroundColor: 'rgba(34, 197, 94, 0.1)',
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: 'Unused/Waste ($)',
                        data: rawData.unused,
                        borderColor: '#ef4444', // Red
                        backgroundColor: 'rgba(239, 68, 68, 0.1)',
                        fill: true,
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    </script>

{% endblock %}
