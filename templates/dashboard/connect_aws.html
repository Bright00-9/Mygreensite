{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-slate-950 flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-slate-900 border border-slate-700 rounded-2xl p-8 shadow-2xl">
        <h2 class="text-2xl font-bold text-white mb-6 text-center">
            <span class="text-green-500">📡</span> Cloud Configuration
        </h2>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-slate-400 text-sm mb-1">AWS Access Key</label>
                <input type="text" name="access_key" required 
                       class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            
            <div>
                <label class="block text-slate-400 text-sm mb-1">AWS Secret Key</label>
                <input type="password" name="secret_key" required 
                       class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            
            <div>
                <label class="block text-slate-400 text-sm mb-1">Region</label>
                <select name="region" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white">
                    <option value="us-east-1">US East (N. Virginia)</option>
                    <option value="eu-west-1">EU West (Ireland)</option>
                    <option value="af-south-1">Africa (Cape Town)</option>
                </select>
            </div>

            <button type="submit" 
                    class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg transition-all mt-4">
                SECURE CONNECTION
            </button>
        </form>
    </div>
</div>
{% endblock %}
