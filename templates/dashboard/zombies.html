{% extends 'base.html' %}
{% block content %}

<h1 class="text-3xl font-bold text-red-500 mb-6">Zombie Resource Hunter</h1>

<div class="bg-gray-900 p-6 rounded-xl border border-red-900/30">
    <table class="w-full text-left">
        <thead>
            <tr class="text-gray-500 border-b border-gray-800">
                <th class="py-2">Instance ID</th>
                <th>CPU Utilization</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
          {% for z in zombies %}
            <tr class="border-b border-gray-800">
                <td class="py-4">{{ z.id }}</td>
                <td class="text-red-400">{{ z.cpu }}% (Critical Waste)</td>
                <td>
                    <form method="POST">
                        {% csrf_token %}
                        <input type="hidden" name="instance_id" value="{{ z.id }}">
                        <button name="terminate" class="bg-red-600 px-3 py-1 rounded text-xs hover:bg-red-500">Terminate</button>
                    </form>
                </td>
            </tr>
          {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
