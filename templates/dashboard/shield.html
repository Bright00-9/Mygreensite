{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8 col-sm-12">
            
            <div class="text-center mb-5">
                <div class="shield-icon-container mb-3">
                    <i class="fas fa-shield-alt fa-4x" style="color: var(--komado-green);"></i>
                </div>
                <h1 class="display-6 fw-bold">Shield Scheduler</h1>
                <span class="status-badge">System Status: Active</span>
            </div>

            <div class="shield-card">
                <h5 class="mb-4"><i class="fas fa-cog me-2"></i>Defense Configuration</h5>
                
                <form method="POST" action="{% url 'dashboard:shield' pk=account.id %}">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label text-secondary small">PROTECTION TARGET</label>
                        <select name="service" class="form-select form-select-lg">
                            <option value="EC2">EC2 Zombie Hunter</option>
                            <option value="S3">S3 Storage Guard</option>
                            <option value="RDS">RDS Idle Shield</option>
                            <option value="LAMBDA">Lambda Execution Monitor</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-secondary small">SCAN FREQUENCY (MINUTES)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-white"><i class="fas fa-clock"></i></span>
                            <input type="number" name="frequency" class="form-control form-control-lg" placeholder="60" required>
                        </div>
                    </div>

                    <button type="submit" class="btn glow-button w-100 py-3 mt-3">
                        <i class="fas fa-bolt me-2"></i>UPDATE SHIELD
                    </button>
                </form>
            </div>

            <div class="mt-4 text-center">
                <p class="small text-secondary">
                    <i class="fas fa-info-circle me-1"></i> 
                    The Shield Scheduler automatically optimizes resources to lower your carbon footprint.
                </p>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary small">PROTECTION TARGE
                </label>
                <select name="service" class="form-select form-select-lg">
                  <option value="EC2" {% if current_service == 'EC2' %}selected{% endif %}>EC2 Zombie Hunter</option>
                  <option value="S3" {% if current_service == 'S3' %}selected{% endif %}>S3 Storage Guard</option>
                  <option value="RDS" {% if current_service == 'RDS' %}selected{% endif %}>RDS Idle Shield</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label text-secondary small">SCAN FREQUENCY (MINUTES)</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-white"><i class="fas fa-clock"></i></span>
                    <input type="number" name="frequency" class="form-control form-control-lg" 
                  value="{{ task.interval.every|default:60 }}" required>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
