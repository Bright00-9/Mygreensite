{% extends 'base.html' %}
{% block content %}
<div class="p-4 bg-slate-950 min-h-screen text-white">
    <div class="mb-8 text-center">
        <h2 class="text-slate-400 text-sm uppercase tracking-widest mb-2">Cloud Eco-Score</h2>
        <div class="relative inline-flex items-center justify-center">
            <svg class="w-32 h-32">
                <circle cx="64" cy="64" r="58" stroke="currentColor" stroke-width="8" fill="transparent" class="text-slate-800"></circle>
                <circle cx="64" cy="64" r="58" stroke="currentColor" stroke-width="8" fill="transparent" 
                        class="text-green-500" stroke-dasharray="364" stroke-dashoffset="{{ 364|add:-eco_score }}" 
                        style="transition: stroke-dashoffset 1s ease-in-out;"></circle>
            </svg>
            <span class="absolute text-3xl font-bold">{{ eco_score }}</span>
        </div>
        <p class="text-green-400 text-xs mt-2 font-mono">Optimized for GreenOps</p>
    </div>

    <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-xl">
        <h3 class="text-lg font-semibold mb-4 text-blue-400">7-Day Cost Analytics (FinOps)</h3>
        <canvas id="finopsChart" height="200"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('finopsChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: {{ labels|safe }},
            datasets: [{
                label: 'Cost ($)',
                data: {{ costs|safe }},
                borderColor: '#10b981', // Emerald Green
                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: {
                y: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } },
                x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
            }
        }
    });
</script>
{% endblock %}
